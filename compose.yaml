x-app: &app
  build: .
  environment:
    # ── Database ──
    DATABASE_URL: "http://sqld:8080"

    # ── Cache ──
    # Connection URL for the Valkey (Redis-compatible) cache server.
    CACHE_URL: "redis://valkey:6379"

    # ── S3 Storage (MinIO) ──
    # Endpoint and credentials for the S3-compatible storage server.
    # ⚠ Override in .env for production — defaults are only safe for local
    #   dev where MinIO is not exposed outside the Docker network.
    S3_ENDPOINT: "http://minio:9000"
    S3_ACCESS_KEY_ID: "${S3_ACCESS_KEY_ID:-acme}"
    S3_SECRET_ACCESS_KEY: "${S3_SECRET_ACCESS_KEY:-acme-secret-key}"
    S3_REGION: "${S3_REGION:-us-east-1}"
    # Bucket names for public (e.g., avatars) and private (e.g., DMs) files.
    S3_BUCKET_PUBLIC: "${S3_BUCKET_PUBLIC:-acme-public}"
    S3_BUCKET_PRIVATE: "${S3_BUCKET_PRIVATE:-acme-private}"

    # Direct URL for the public bucket (R2 custom domain, CDN, etc.).
    # Only needed when S3_ENDPOINT differs from the public serving URL
    # (e.g., Cloudflare R2 where S3 API and public access use different domains).
    # When empty, public files are served through the /media proxy.
    STORAGE_URL_PUBLIC: "${STORAGE_URL_PUBLIC:-}"
    # Optional key prefix per bucket, for namespacing within a single S3
    # bucket (e.g., per-prefix visibility rules, CI branch isolation).
    STORAGE_PREFIX_PUBLIC: "${STORAGE_PREFIX_PUBLIC:-}"
    STORAGE_PREFIX_PRIVATE: "${STORAGE_PREFIX_PRIVATE:-}"

    # ── Storage signing ──
    # HMAC key for signing private file URLs. When set, private files are
    # served through the /media proxy with HMAC token verification instead
    # of S3 presigned URLs. Required here because MinIO is internal and
    # not reachable from the browser.
    STORAGE_SIGNING_KEY: "${STORAGE_SIGNING_KEY:?required}"
  depends_on:
    sqld:
      condition: service_healthy
    valkey:
      condition: service_healthy
    minio:
      condition: service_healthy

services:
  migrate:
    <<: *app
    command: ["pnpm", "exec", "drizzle-kit", "migrate"]
    restart: "no"

  app:
    <<: *app
    command: ["node", "index.mjs"]
    ports:
      - "3000:3000"
    depends_on:
      sqld:
        condition: service_healthy
      valkey:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  sqld:
    image: ghcr.io/tursodatabase/libsql-server:v0.24.33
    volumes:
      - sqld-data:/var/lib/sqld
    healthcheck:
      # A poor man's way to check if sqld is up and accepting connections
      # since the image lacks wget or curl.
      test:
        - CMD-SHELL
        - timeout 1 cat < /dev/tcp/localhost/8080 ; [ $? -ne 1 ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  valkey:
    image: valkey/valkey:9-alpine
    command: ["valkey-server", "--appendonly", "yes"]
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: "${S3_ACCESS_KEY_ID:-acme}"
      MINIO_ROOT_PASSWORD: "${S3_SECRET_ACCESS_KEY:-acme-secret-key}"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  minio-init:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MC_ACCESS_KEY: "${S3_ACCESS_KEY_ID:-acme}"
      MC_SECRET_KEY: "${S3_SECRET_ACCESS_KEY:-acme-secret-key}"
      BUCKET_PUBLIC: "${S3_BUCKET_PUBLIC:-acme-public}"
      BUCKET_PRIVATE: "${S3_BUCKET_PRIVATE:-acme-private}"
    entrypoint: >
      sh -c "
      mc alias set local http://minio:9000 $$MC_ACCESS_KEY $$MC_SECRET_KEY &&
      mc mb --ignore-existing local/$$BUCKET_PUBLIC &&
      mc mb --ignore-existing local/$$BUCKET_PRIVATE
      "
    restart: "no"

volumes:
  sqld-data:
  valkey-data:
  minio-data:
