name: Checks & Preview

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      pull-requests: write
    env:
      TURBO_TELEMETRY_DISABLED: 1
      STAGING_PROJECT_NAME: ygoma-staging
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Lint
        run: pnpm lint

      - name: Build
        working-directory: apps/web
        run: pnpm build:preview

      - name: Deploy
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          workingDirectory: apps/web
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ env.STAGING_PROJECT_NAME }} --branch=${{ github.head_ref || github.ref_name }}

      - name: Comment preview URL
        if: >-
          github.event_name == 'pull_request' &&
          steps.deploy.outcome == 'success'
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: preview-deployment
          message: >-
            **Preview deployment:**
            ${{ steps.deploy.outputs.pages-deployment-alias-url }}
