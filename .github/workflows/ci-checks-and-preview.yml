name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  preview:
    name: Checks & Preview
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event_name == 'push' && 'staging' || 'preview' }}
      url: ${{ steps.deploy.outputs.pages-deployment-alias-url || env.STAGING_URL || steps.deploy.outputs.pages-deployment-url }}
    permissions:
      contents: read
      pull-requests: write
    env:
      TURBO_TELEMETRY_DISABLED: 1
      PROJECT_NAME: ${{ vars.PROJECT_NAME || github.event.repository.name }}
      STAGING_URL: ${{ vars.STAGING_URL }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Lint
        run: bun lint

      - name: Install Playwright
        run: bun playwright:install

      - name: Test
        run: bun test:cov

      - name: Upload coverage
        if: env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v6
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Prepare variables
        id: branch
        env:
          SLUG: ${{ github.head_ref || github.ref_name }}
        run: |
          # Slugify: replace non-alphanumeric with dashes, collapse, trim.
          slugify() { echo -n "$1" | sed 's/[^a-zA-Z0-9]/-/g; s/--*/-/g; s/^-//; s/-$//'; }

          PROJECT_SLUG=$(slugify "$PROJECT_NAME")
          BRANCH_SLUG=$(slugify "$SLUG")
          if [ -z "$BRANCH_SLUG" ]; then
            BRANCH_SLUG="pr-${{ github.event.pull_request.number }}"
          fi

          if [ "${{ github.ref_name }}" = "main" ] && [ "${{ github.event_name }}" = "push" ]; then
            echo "db_name=$PROJECT_SLUG-staging" >> "$GITHUB_OUTPUT"
          else
            echo "db_name=$PROJECT_SLUG-preview-$BRANCH_SLUG" >> "$GITHUB_OUTPUT"
          fi

          OWNER_SLUG=$(slugify "${{ github.repository_owner }}")
          echo "project_slug=$PROJECT_SLUG" >> "$GITHUB_OUTPUT"
          echo "owner_slug=$OWNER_SLUG" >> "$GITHUB_OUTPUT"

          VERSION=$(jq -r .version package.json)
          SHORT_SHA=${GITHUB_SHA::7}
          SENTRY_ENV=${{ github.event_name == 'push' && 'staging' || 'preview' }}

          echo "branch_slug=$BRANCH_SLUG" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sentry_environment=$SENTRY_ENV" >> "$GITHUB_OUTPUT"
          echo "sentry_release=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sentry_dist=$SENTRY_ENV-$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Setup D1 database
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        id: d1
        working-directory: packages/app
        env:
          DB_NAME: ${{ steps.branch.outputs.db_name }}
        run: |
          EXISTING=$(bunx wrangler d1 list --json | jq -r ".[] | select(.name == \"$DB_NAME\") | .uuid")
          if [ -n "$EXISTING" ]; then
            DB_ID="$EXISTING"
          else
            RESULT=$(bunx wrangler d1 create "$DB_NAME")
            DB_ID=$(echo "$RESULT" | grep '"database_id"' | sed 's/.*"database_id": *"\([^"]*\)".*/\1/')
            NEW_DB=true
          fi

          echo "Updating wrangler.json with database $DB_NAME (ID: $DB_ID)"

          jq --arg db_name "$DB_NAME" --arg db_id "$DB_ID" \
            '.d1_databases[0].database_name = $db_name |
             .d1_databases[0].database_id = $db_id' \
            wrangler.json > wrangler.json.tmp
          mv wrangler.json.tmp wrangler.json

          bunx wrangler d1 migrations apply "$DB_NAME" --remote

          if [ "${NEW_DB:-}" = "true" ]; then
            bunx wrangler d1 execute "$DB_NAME" --remote --file=seed.sql
          fi

      - name: Set runtime vars
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        working-directory: packages/app
        env:
          SENTRY_ENVIRONMENT: ${{ steps.branch.outputs.sentry_environment }}
          SENTRY_RELEASE: ${{ steps.branch.outputs.sentry_release }}
          SENTRY_DIST: ${{ steps.branch.outputs.sentry_dist }}
        run: |
          jq --arg env "$SENTRY_ENVIRONMENT" \
            --arg rel "$SENTRY_RELEASE" \
            --arg dist "$SENTRY_DIST" \
            '.vars.SENTRY_ENVIRONMENT = $env |
             .vars.SENTRY_RELEASE = $rel |
             .vars.SENTRY_DIST = $dist' \
            wrangler.json > wrangler.json.tmp
          mv wrangler.json.tmp wrangler.json

          cat wrangler.json

      - name: Build
        # Note: this should happen after any step that changes wrangler.json
        working-directory: packages/app
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ENVIRONMENT: ${{ steps.branch.outputs.sentry_environment }}
          SENTRY_RELEASE: ${{ steps.branch.outputs.sentry_release }}
          SENTRY_DIST: ${{ steps.branch.outputs.sentry_dist }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG || steps.branch.outputs.owner_slug }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT || steps.branch.outputs.project_slug }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: bun run build:preview

      - name: Create Pages project
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        working-directory: packages/app
        run: bunx wrangler pages project create ${{ steps.branch.outputs.project_slug }}-staging --production-branch main || true

      - name: Deploy
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          wranglerVersion: "4.75.0"
          workingDirectory: packages/app
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy dist
            --project-name=${{ steps.branch.outputs.project_slug }}-staging
            --branch=${{ github.head_ref || github.ref_name }}

      - name: Set Pages secrets
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        working-directory: packages/app
        run: |
          for ENV in preview production; do
            echo "${{ secrets.SENTRY_DSN }}" | bunx wrangler pages secret put SENTRY_DSN --project-name=${{ steps.branch.outputs.project_slug }}-staging --env $ENV
          done

      - name: Health check
        if: steps.deploy.outcome == 'success'
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.pages-deployment-alias-url || env.STAGING_URL || steps.deploy.outputs.pages-deployment-url }}
        run: |
          curl -fsSL --retry 10 --retry-max-time 300 --retry-all-errors "$DEPLOY_URL/api/health"
