name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  preview:
    name: Checks & Preview
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event_name == 'push' && 'staging' || 'preview' }}
      url: ${{ steps.deploy.outputs.pages-deployment-alias-url || env.STAGING_URL || steps.deploy.outputs.pages-deployment-url }}
    permissions:
      contents: read
      pull-requests: write
    env:
      TURBO_TELEMETRY_DISABLED: 1
      PROJECT_NAME: ${{ vars.PROJECT_NAME || github.event.repository.name }}
      STAGING_URL: ${{ vars.STAGING_URL }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Lint
        run: pnpm lint

      - name: Install Playwright
        run: pnpm playwright:install

      - name: Test
        run: pnpm test:cov

      - name: Upload coverage
        if: env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v6
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Prepare variables
        id: branch
        env:
          SLUG: ${{ github.head_ref || github.ref_name }}
        run: |
          # Slugify: replace non-alphanumeric with dashes, collapse, trim.
          slugify() { echo -n "$1" | sed 's/[^a-zA-Z0-9]/-/g; s/--*/-/g; s/^-//; s/-$//'; }

          PROJECT_SLUG=$(slugify "$PROJECT_NAME")
          BRANCH_SLUG=$(slugify "$SLUG")
          if [ -z "$BRANCH_SLUG" ]; then
            BRANCH_SLUG="pr-${{ github.event.pull_request.number }}"
          fi

          if [ "${{ github.ref_name }}" = "main" ] && [ "${{ github.event_name }}" = "push" ]; then
            echo "db_name=$PROJECT_SLUG-staging-db" >> "$GITHUB_OUTPUT"
            echo "kv_name=$PROJECT_SLUG-staging-cache" >> "$GITHUB_OUTPUT"
          else
            echo "db_name=$PROJECT_SLUG-preview-$BRANCH_SLUG-db" >> "$GITHUB_OUTPUT"
            echo "kv_name=$PROJECT_SLUG-preview-$BRANCH_SLUG-cache" >> "$GITHUB_OUTPUT"
          fi

          OWNER_SLUG=$(slugify "${{ github.repository_owner }}")
          echo "project_slug=$PROJECT_SLUG" >> "$GITHUB_OUTPUT"
          echo "owner_slug=$OWNER_SLUG" >> "$GITHUB_OUTPUT"

          VERSION=$(jq -r .version package.json)
          REAL_SHA=${{ github.event.pull_request.head.sha || github.sha }}
          SHORT_SHA=${REAL_SHA::7}
          SENTRY_ENV=${{ github.event_name == 'push' && 'staging' || 'preview' }}

          echo "branch_slug=$BRANCH_SLUG" >> "$GITHUB_OUTPUT"
          echo "sentry_environment=$SENTRY_ENV" >> "$GITHUB_OUTPUT"
          echo "sentry_release=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sentry_dist=$SENTRY_ENV-$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Setup D1 database
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        id: d1
        working-directory: packages/app
        env:
          DB_NAME: ${{ steps.branch.outputs.db_name }}
        run: |
          EXISTING=$(pnpm exec wrangler d1 list --json | jq -r ".[] | select(.name == \"$DB_NAME\") | .uuid")
          if [ -n "$EXISTING" ]; then
            DB_ID="$EXISTING"
          else
            RESULT=$(pnpm exec wrangler d1 create "$DB_NAME")
            DB_ID=$(echo "$RESULT" | grep '"database_id"' | sed 's/.*"database_id": *"\([^"]*\)".*/\1/')
            NEW_DB=true
          fi

          echo "Updating wrangler.json with database $DB_NAME (ID: $DB_ID)"

          jq --arg db_name "$DB_NAME" --arg db_id "$DB_ID" \
            '.d1_databases[0].database_name = $db_name |
             .d1_databases[0].database_id = $db_id' \
            wrangler.json > wrangler.json.tmp
          mv wrangler.json.tmp wrangler.json

          pnpm exec wrangler d1 migrations apply "$DB_NAME" --remote

          if [ "${NEW_DB:-}" = "true" ]; then
            pnpm exec wrangler d1 execute "$DB_NAME" --remote --file=src/server/db/seed.sql
          fi

      - name: Setup KV namespace
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        working-directory: packages/app
        env:
          KV_NAME: ${{ steps.branch.outputs.kv_name }}
        run: |
          KV_ID=$(pnpm exec wrangler kv namespace list | jq -r ".[] | select(.title == \"$KV_NAME\") | .id")
          if [ -z "$KV_ID" ]; then
            pnpm exec wrangler kv namespace create "$KV_NAME"
            KV_ID=$(pnpm exec wrangler kv namespace list | jq -r ".[] | select(.title == \"$KV_NAME\") | .id")
          fi

          echo "Updating wrangler.json with KV namespace $KV_NAME (ID: $KV_ID)"
          jq --arg kv_id "$KV_ID" \
            '.kv_namespaces[0].id = $kv_id' \
            wrangler.json > wrangler.json.tmp
          mv wrangler.json.tmp wrangler.json

      - name: Setup R2 bindings
        if: >-
          env.CLOUDFLARE_API_TOKEN != '' &&
          env.CLOUDFLARE_ACCOUNT_ID != '' &&
          vars.R2_BUCKET_PUBLIC != '' &&
          vars.R2_BUCKET_PRIVATE != ''
        working-directory: packages/app
        env:
          R2_BUCKET_PUBLIC: ${{ vars.R2_BUCKET_PUBLIC }}
          R2_BUCKET_PRIVATE: ${{ vars.R2_BUCKET_PRIVATE }}
        run: |
          jq --arg pub "$R2_BUCKET_PUBLIC" --arg priv "$R2_BUCKET_PRIVATE" \
            '.r2_buckets = [
              {"binding": "STORAGE_PUBLIC", "bucket_name": $pub},
              {"binding": "STORAGE_PRIVATE", "bucket_name": $priv}
            ]' \
            wrangler.json > wrangler.json.tmp
          mv wrangler.json.tmp wrangler.json

      - name: Set runtime vars
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        working-directory: packages/app
        env:
          SENTRY_ENVIRONMENT: ${{ steps.branch.outputs.sentry_environment }}
          SENTRY_RELEASE: ${{ steps.branch.outputs.sentry_release }}
          SENTRY_DIST: ${{ steps.branch.outputs.sentry_dist }}
          STORAGE_URL_PUBLIC: ${{ vars.STORAGE_URL_PUBLIC }}
          KV_STORAGE: ${{ github.ref_name != 'main' && 'CACHE' || '' }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_REGION: ${{ vars.S3_REGION || 'auto' }}
          S3_BUCKET_PUBLIC: ${{ vars.S3_BUCKET_PUBLIC || vars.R2_BUCKET_PUBLIC }}
          S3_BUCKET_PRIVATE: ${{ vars.S3_BUCKET_PRIVATE || vars.R2_BUCKET_PRIVATE }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BRANCH_SLUG: ${{ steps.branch.outputs.branch_slug }}
        run: |
          # Auto-disable HMAC when S3 presigning is available.
          # When S3_ENDPOINT is set, the app uses S3 presigned URLs directly.
          # Otherwise, generate a stable per-deployment HMAC signing key.
          if [ -n "$S3_ENDPOINT" ]; then
            STORAGE_SIGNING_KEY=""
          else
            STORAGE_SIGNING_KEY="${GITHUB_REPOSITORY}:${PR_NUMBER:-main}:${BRANCH_SLUG}"
          fi

          # Per-bucket key prefix: branch slug for preview, empty for staging.
          if [ "${{ github.ref_name }}" = "main" ] && [ "${{ github.event_name }}" = "push" ]; then
            STORAGE_PREFIX=""
          else
            STORAGE_PREFIX="$BRANCH_SLUG"
          fi

          # Build a JSON object of all runtime vars, then filter out
          # empty values so they don't override the app's defaults.
          jq --arg env "$SENTRY_ENVIRONMENT" \
            --arg rel "$SENTRY_RELEASE" \
            --arg dist "$SENTRY_DIST" \
            --arg prefix_public "$STORAGE_PREFIX" \
            --arg prefix_private "$STORAGE_PREFIX" \
            --arg signing_key "$STORAGE_SIGNING_KEY" \
            --arg storage_url_public "$STORAGE_URL_PUBLIC" \
            --arg kv_storage "$KV_STORAGE" \
            --arg s3_endpoint "$S3_ENDPOINT" \
            --arg s3_access_key_id "$S3_ACCESS_KEY_ID" \
            --arg s3_secret_access_key "$S3_SECRET_ACCESS_KEY" \
            --arg s3_region "$S3_REGION" \
            --arg s3_bucket_public "$S3_BUCKET_PUBLIC" \
            --arg s3_bucket_private "$S3_BUCKET_PRIVATE" \
            '.vars = (.vars // {}) + ({
               SENTRY_ENVIRONMENT: $env,
               SENTRY_RELEASE: $rel,
               SENTRY_DIST: $dist,
               STORAGE_PREFIX_PUBLIC: $prefix_public,
               STORAGE_PREFIX_PRIVATE: $prefix_private,
               STORAGE_SIGNING_KEY: $signing_key,
               STORAGE_URL_PUBLIC: $storage_url_public,
               KV_STORAGE: $kv_storage,
               S3_ENDPOINT: $s3_endpoint,
               S3_ACCESS_KEY_ID: $s3_access_key_id,
               S3_SECRET_ACCESS_KEY: $s3_secret_access_key,
               S3_REGION: $s3_region,
               S3_BUCKET_PUBLIC: $s3_bucket_public,
               S3_BUCKET_PRIVATE: $s3_bucket_private
             } | with_entries(select(.value != "")))' \
            wrangler.json > wrangler.json.tmp
          mv wrangler.json.tmp wrangler.json

      - name: Build
        # Note: this should happen after any step that changes wrangler.json
        working-directory: packages/app
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ENVIRONMENT: ${{ steps.branch.outputs.sentry_environment }}
          SENTRY_RELEASE: ${{ steps.branch.outputs.sentry_release }}
          SENTRY_DIST: ${{ steps.branch.outputs.sentry_dist }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG || secrets.SENTRY_ORG || steps.branch.outputs.owner_slug }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT || secrets.SENTRY_PROJECT || steps.branch.outputs.project_slug }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: pnpm run build:preview

      - name: Create Pages project
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        working-directory: packages/app
        run: pnpm exec wrangler pages project create ${{ steps.branch.outputs.project_slug }}-staging --production-branch main || true

      - name: Deploy
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        id: deploy
        working-directory: packages/app
        env:
          WRANGLER_OUTPUT_FILE_PATH: ${{ runner.temp }}/wrangler-output.ndjson
          PROJECT_SLUG: ${{ steps.branch.outputs.project_slug }}
          BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          pnpm exec wrangler pages deploy dist \
            --project-name="$PROJECT_SLUG-staging" \
            --branch="$BRANCH" \
            --commit-dirty=true

          if [[ ! -s "$WRANGLER_OUTPUT_FILE_PATH" ]]; then
            echo "::error::wrangler did not write structured output to $WRANGLER_OUTPUT_FILE_PATH (env var unsupported by this wrangler version?)" >&2
            exit 1
          fi

          deployment_url=$(jq -r 'select(.type == "pages-deploy-detailed") | .url // empty' "$WRANGLER_OUTPUT_FILE_PATH" | head -n1)
          alias_url=$(jq -r 'select(.type == "pages-deploy-detailed") | .alias // empty' "$WRANGLER_OUTPUT_FILE_PATH" | head -n1)

          if [[ -z "$deployment_url" ]]; then
            echo "::error::could not extract deployment URL from wrangler output (no pages-deploy-detailed entry with .url)" >&2
            echo "--- $WRANGLER_OUTPUT_FILE_PATH ---" >&2
            cat "$WRANGLER_OUTPUT_FILE_PATH" >&2
            exit 1
          fi

          echo "pages-deployment-url=$deployment_url" >> "$GITHUB_OUTPUT"
          echo "pages-deployment-alias-url=$alias_url" >> "$GITHUB_OUTPUT"

      - name: Set Pages secrets
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        working-directory: packages/app
        run: |
          for ENV in preview production; do
            echo "${{ secrets.SENTRY_DSN }}" | pnpm exec wrangler pages secret put SENTRY_DSN --project-name=${{ steps.branch.outputs.project_slug }}-staging --env $ENV
            echo "${{ secrets.BASIC_AUTH_CREDENTIALS }}" | pnpm exec wrangler pages secret put BASIC_AUTH_CREDENTIALS --project-name=${{ steps.branch.outputs.project_slug }}-staging --env $ENV
          done

      - name: Health check
        if: steps.deploy.outcome == 'success'
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.pages-deployment-alias-url || env.STAGING_URL || steps.deploy.outputs.pages-deployment-url }}
        run: |
          curl -fsSL --retry 10 --retry-max-time 300 --retry-all-errors \
            -A "acme-ci-health-probe" "$DEPLOY_URL/health"
