name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  preview:
    name: Checks & Preview
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event_name == 'push' && 'staging' || 'preview' }}
      url: ${{ steps.deploy.outputs.pages-deployment-alias-url || env.STAGING_DEFAULT_URL }}
    permissions:
      contents: read
      pull-requests: write
    env:
      TURBO_TELEMETRY_DISABLED: 1
      STAGING_PROJECT_NAME: ygoma-staging
      STAGING_DB_NAME: ygoma-staging
      PREVIEW_DB_PREFIX: ygoma-preview
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      STAGING_DEFAULT_URL: https://staging.yugioh.ma
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Lint
        run: bun lint

      - name: Prepare variables
        id: branch
        env:
          SLUG: ${{ github.head_ref || github.ref_name }}
        run: |
          # Replace non-alphanumeric characters with dashes,
          # collapse multiple dashes, and trim leading/trailing dashes.
          # If the result is empty, use "pr-<number>" as a fallback.
          SLUG=$(echo -n "$SLUG" | sed 's/[^a-zA-Z0-9]/-/g; s/--*/-/g; s/^-//; s/-$//')
          if [ -z "$SLUG" ]; then
            SLUG="pr-${{ github.event.pull_request.number }}"
          fi

          if [ "${{ github.ref_name }}" = "main" ] && [ "${{ github.event_name }}" = "push" ]; then
            echo "db_name=$STAGING_DB_NAME" >> "$GITHUB_OUTPUT"
          else
            echo "db_name=$PREVIEW_DB_PREFIX-$SLUG" >> "$GITHUB_OUTPUT"
          fi

          VERSION=$(jq -r .version package.json)
          SHORT_SHA=${GITHUB_SHA::7}
          SENTRY_ENV=${{ github.event_name == 'push' && 'staging' || 'preview' }}

          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sentry_environment=$SENTRY_ENV" >> "$GITHUB_OUTPUT"
          echo "sentry_release=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sentry_dist=$SENTRY_ENV-$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Setup D1 database
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        id: d1
        working-directory: apps/web
        env:
          DB_NAME: ${{ steps.branch.outputs.db_name }}
        run: |
          EXISTING=$(bunx wrangler d1 list --json | jq -r ".[] | select(.name == \"$DB_NAME\") | .uuid")
          if [ -n "$EXISTING" ]; then
            DB_ID="$EXISTING"
          else
            RESULT=$(bunx wrangler d1 create "$DB_NAME")
            DB_ID=$(echo "$RESULT" | grep '"database_id"' | sed 's/.*"database_id": *"\([^"]*\)".*/\1/')
            NEW_DB=true
          fi

          echo "Updating wrangler.json with database $DB_NAME (ID: $DB_ID)"

          jq --arg db_name "$DB_NAME" --arg db_id "$DB_ID" \
            '.d1_databases[0].database_name = $db_name |
             .d1_databases[0].database_id = $db_id' \
            wrangler.json > wrangler.json.tmp
          mv wrangler.json.tmp wrangler.json

          bunx wrangler d1 migrations apply "$DB_NAME" --remote

          if [ "${NEW_DB:-}" = "true" ]; then
            bunx wrangler d1 execute "$DB_NAME" --remote --file=seed.sql
          fi

      - name: Set runtime vars
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        working-directory: apps/web
        env:
          SENTRY_ENVIRONMENT: ${{ steps.branch.outputs.sentry_environment }}
          SENTRY_RELEASE: ${{ steps.branch.outputs.sentry_release }}
          SENTRY_DIST: ${{ steps.branch.outputs.sentry_dist }}
        run: |
          jq --arg env "$SENTRY_ENVIRONMENT" \
            --arg rel "$SENTRY_RELEASE" \
            --arg dist "$SENTRY_DIST" \
            '.vars.SENTRY_ENVIRONMENT = $env |
             .vars.SENTRY_RELEASE = $rel |
             .vars.SENTRY_DIST = $dist' \
            wrangler.json > wrangler.json.tmp
          mv wrangler.json.tmp wrangler.json

          cat wrangler.json

      - name: Build
        # Note: this should happen after any step that changes wrangler.json
        working-directory: apps/web
        env:
          VITE_SENTRY_ENABLED: ${{ secrets.SENTRY_DSN != '' && 'true' || '' }}
          VITE_SENTRY_ENVIRONMENT: ${{ steps.branch.outputs.sentry_environment }}
          VITE_SENTRY_RELEASE: ${{ steps.branch.outputs.sentry_release }}
          VITE_SENTRY_DIST: ${{ steps.branch.outputs.sentry_dist }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: bun run build:preview

      - name: Set Pages secrets
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        working-directory: apps/web
        run: |
          for ENV in preview production; do
            echo "${{ secrets.SENTRY_DSN }}" | bunx wrangler pages secret put SENTRY_DSN --project-name=${{ env.STAGING_PROJECT_NAME }} --env $ENV
          done

      - name: Deploy
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          wranglerVersion: "4.75.0"
          workingDirectory: apps/web
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy dist
            --project-name=${{ env.STAGING_PROJECT_NAME }}
            --branch=${{ github.head_ref || github.ref_name }}

      - name: Health check
        if: steps.deploy.outcome == 'success'
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.pages-deployment-alias-url || env.STAGING_DEFAULT_URL }}
        run: |
          curl -fsSL --retry 5 --retry-delay 5 --retry-all-errors "$DEPLOY_URL/api/health"
