name: Checks & Deploy Preview

on:
  pull_request:
  push:
    branches: [main]

jobs:
  preview:
    name: Checks & Deploy Preview
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event_name == 'push' && 'staging' || 'preview' }}
      url: ${{ steps.deploy.outputs.pages-deployment-alias-url || 'https://staging.yugioh.ma/' }}
    permissions:
      contents: read
      pull-requests: write
    env:
      TURBO_TELEMETRY_DISABLED: 1
      STAGING_PROJECT_NAME: ygoma-staging
      STAGING_DB_NAME: ygoma-staging
      PREVIEW_DB_PREFIX: ygoma-preview
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Lint
        run: pnpm lint

      - name: Set branch slug
        id: branch
        env:
          SLUG: ${{ github.head_ref || github.ref_name }}
        run: |
          # Replace non-alphanumeric characters with dashes,
          # collapse multiple dashes, and trim leading/trailing dashes.
          # If the result is empty, use "pr-<number>" as a fallback.
          SLUG=$(echo -n "$SLUG" | sed 's/[^a-zA-Z0-9]/-/g; s/--*/-/g; s/^-//; s/-$//')
          if [ -z "$SLUG" ]; then
            SLUG="pr-${{ github.event.pull_request.number }}"
          fi

          if [ "${{ github.ref_name }}" = "main" ] && [ "${{ github.event_name }}" = "push" ]; then
            echo "db_name=$STAGING_DB_NAME" >> "$GITHUB_OUTPUT"
          else
            echo "db_name=$PREVIEW_DB_PREFIX-$SLUG" >> "$GITHUB_OUTPUT"
          fi

          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"

      - name: Setup D1 database
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        id: d1
        working-directory: apps/web
        env:
          DB_NAME: ${{ steps.branch.outputs.db_name }}
        run: |
          EXISTING=$(pnpm wrangler d1 list --json | jq -r ".[] | select(.name == \"$DB_NAME\") | .uuid")
          if [ -n "$EXISTING" ]; then
            DB_ID="$EXISTING"
          else
            RESULT=$(pnpm wrangler d1 create "$DB_NAME")
            DB_ID=$(echo "$RESULT" | grep 'database_id' | sed 's/.*= "\(.*\)"/\1/')
            NEW_DB=true
          fi

          echo "Updating wrangler.toml with database $DB_NAME (ID: $DB_ID)"
          sed -i "s/^database_name = .*/database_name = \"$DB_NAME\"/" wrangler.toml
          sed -i "s/^database_id = .*/database_id = \"$DB_ID\"/" wrangler.toml

          pnpm wrangler d1 migrations apply "$DB_NAME" --remote

          if [ "${NEW_DB:-}" = "true" ]; then
            pnpm wrangler d1 execute "$DB_NAME" --remote --file=seed.sql
          fi

      - name: Build
        working-directory: apps/web
        run: pnpm build:preview

      - name: Deploy
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          workingDirectory: apps/web
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy dist
            --project-name=${{ env.STAGING_PROJECT_NAME }}
            --branch=${{ github.head_ref || github.ref_name }}

      - name: Health check
        if: steps.deploy.outcome == 'success'
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.pages-deployment-alias-url }}
          HEALTHCHECK_AUTH: ${{ secrets.HEALTHCHECK_AUTH }}
        run: |
          echo "$DEPLOY_URL/api/health"
          ARGS=(-fsSL --retry 5 --retry-delay 5 --retry-all-errors)
          if [ -n "$HEALTHCHECK_AUTH" ]; then
            echo "Using basic auth for health check"
            ARGS+=(-H "Authorization: Basic $HEALTHCHECK_AUTH")
          fi
          echo
          curl "${ARGS[@]}" "$DEPLOY_URL/api/health"
