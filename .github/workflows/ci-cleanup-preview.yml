name: CI

on:
  pull_request:
    types: [closed]

jobs:
  cleanup:
    name: Preview Cleanup
    runs-on: ubuntu-latest
    environment: preview
    continue-on-error: true
    env:
      PREVIEW_DB_PREFIX: ygoma-preview
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Prepare variables
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        id: branch
        env:
          SLUG: ${{ github.head_ref }}
        run: |
          # Replace non-alphanumeric characters with dashes,
          # collapse multiple dashes, and trim leading/trailing dashes.
          # If the result is empty, use "pr-<number>" as a fallback.
          SLUG=$(echo -n "$SLUG" | sed 's/[^a-zA-Z0-9]/-/g; s/--*/-/g; s/^-//; s/-$//')
          if [ -z "$SLUG" ]; then
            SLUG="pr-${{ github.event.pull_request.number }}"
          fi
          echo "db_name=$PREVIEW_DB_PREFIX-$SLUG" >> "$GITHUB_OUTPUT"

      - name: Delete D1 database
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        uses: cloudflare/wrangler-action@v3
        with:
          wranglerVersion: "4.75.0"
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 delete "${{ steps.branch.outputs.db_name }}" --skip-confirmation
