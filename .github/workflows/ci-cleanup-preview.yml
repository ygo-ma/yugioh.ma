name: CI

on:
  pull_request:
    types: [closed]

jobs:
  cleanup:
    name: Preview Cleanup
    runs-on: ubuntu-latest
    environment: preview
    continue-on-error: true
    env:
      PROJECT_NAME: ${{ vars.PROJECT_NAME || github.event.repository.name }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Prepare variables
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        id: branch
        env:
          SLUG: ${{ github.head_ref }}
        run: |
          # Slugify: replace non-alphanumeric with dashes, collapse, trim.
          slugify() { echo -n "$1" | sed 's/[^a-zA-Z0-9]/-/g; s/--*/-/g; s/^-//; s/-$//'; }

          PROJECT_SLUG=$(slugify "$PROJECT_NAME")
          BRANCH_SLUG=$(slugify "$SLUG")
          if [ -z "$BRANCH_SLUG" ]; then
            BRANCH_SLUG="pr-${{ github.event.pull_request.number }}"
          fi
          echo "db_name=$PROJECT_SLUG-preview-$BRANCH_SLUG" >> "$GITHUB_OUTPUT"
          echo "kv_name=$PROJECT_SLUG-preview-$BRANCH_SLUG-cache" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        uses: actions/checkout@v6

      - name: Setup
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        uses: ./.github/actions/setup

      - name: Delete D1 database
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        working-directory: packages/app
        run: pnpm exec wrangler d1 delete "${{ steps.branch.outputs.db_name }}" --skip-confirmation

      - name: Delete KV namespace
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        working-directory: packages/app
        env:
          KV_NAME: ${{ steps.branch.outputs.kv_name }}
        run: |
          KV_ID=$(pnpm exec wrangler kv namespace list | jq -r ".[] | select(.title == \"$KV_NAME\") | .id")
          if [ -n "$KV_ID" ]; then
            pnpm exec wrangler kv namespace delete --namespace-id "$KV_ID"
          fi
