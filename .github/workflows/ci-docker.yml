name: Docker

on:
  pull_request:
  push:
    branches:
      - main

env:
  STORAGE_SIGNING_KEY: ci-dummy-key

jobs:
  docker-run:
    name: Works with docker run
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build image
        run: docker build -t acme .

      - name: Start container
        run: docker run -d --name acme -e STORAGE_SIGNING_KEY -p 3000:3000 acme

      - name: Health check
        run: curl -fsSL --retry 10 --retry-max-time 60 --retry-all-errors -A "acme-ci-health-probe" http://localhost:3000/health

      - name: Stop container
        if: always()
        run: docker rm -fv acme

  docker-compose:
    name: Works with docker compose
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build & start
        run: docker compose up -d --build

      - name: Health check
        run: curl -fsSL --retry 10 --retry-max-time 60 --retry-all-errors -A "acme-ci-health-probe" http://localhost:3000/health

      - name: Stop
        if: always()
        run: docker compose down -v
